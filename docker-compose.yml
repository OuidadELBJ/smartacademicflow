version: '3.9'

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: saf-postgres
    environment:
      POSTGRES_DB: smartacademicflow
      POSTGRES_USER: saf_admin
      POSTGRES_PASSWORD: saf_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - saf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saf_admin -d smartacademicflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: saf-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass saf_redis_pass
    volumes:
      - redis_data:/data
    networks:
      - saf-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "saf_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend Spring Boot ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saf-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartacademicflow
      SPRING_DATASOURCE_USERNAME: saf_admin
      SPRING_DATASOURCE_PASSWORD: saf_secret_2024
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: saf_redis_pass
      JWT_SECRET: SmartAcademicFlow_JWT_SuperSecret_Key_2024_Production
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saf-network

  # --- AI Microservice FastAPI ---
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: saf-ai-service
    environment:
      PYTHONUNBUFFERED: 1
      CHROMA_PERSIST_DIR: /app/data/chroma
      TESSERACT_CMD: /usr/bin/tesseract
    ports:
      - "8000:8000"
    volumes:
      - ai_data:/app/data
    networks:
      - saf-network

  # --- Frontend Next.js ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saf-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - saf-network

volumes:
  postgres_data:
  redis_data:
  ai_data:

networks:
  saf-network:
    driver: bridge
